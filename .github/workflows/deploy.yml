name: Deploy applik8s Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish packages to npm using trusted publishing
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Release gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run local gates
        run: bun run check:local

      - name: Run package publish dry-run
        run: bun run check:publish-dry-run

      - name: Build ImageJob artifacts
        run: bun run build:imagejob

      - name: Capture artifact listing
        run: find dist/applik8s -maxdepth 3 -type f | sort > dist/applik8s-artifact-list.txt

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: applik8s-release-evidence
          path: |
            dist/applik8s
            dist/applik8s-artifact-list.txt

  publish-npm:
    name: Publish npm packages
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_npm == 'true')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js for npm with OIDC
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages to npm
        run: bun run publish:packages

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create "${GITHUB_REF_NAME}" --title "applik8s ${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
