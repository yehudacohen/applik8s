name: Release Evidence

on:
  workflow_dispatch:
    inputs:
      run_live_e2e:
        description: Run live prerelease E2E with KUBECONFIG_B64 secret
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

jobs:
  evidence:
    name: v0.1 release evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run local gates
        run: bun run check:local

      - name: Run package publish dry-run
        run: bun run check:publish-dry-run

      - name: Build ImageJob artifacts
        run: bun run build:imagejob

      - name: Capture artifact listing
        run: find dist/applik8s -maxdepth 3 -type f | sort > dist/applik8s-artifact-list.txt

      - name: Configure live kubeconfig
        if: ${{ inputs.run_live_e2e == 'true' }}
        run: |
          if [ -z "${KUBECONFIG_B64}" ]; then
            echo "KUBECONFIG_B64 secret is required when run_live_e2e=true" >&2
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Run live prerelease gates
        if: ${{ inputs.run_live_e2e == 'true' }}
        run: APPLIK8S_RELEASE_LIVE_E2E=1 APPLIK8S_E2E_CONTEXT=${APPLIK8S_E2E_CONTEXT} bun run check:prerelease
        env:
          APPLIK8S_E2E_CONTEXT: ${{ vars.APPLIK8S_E2E_CONTEXT }}

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: applik8s-v0.1-release-evidence
          path: |
            dist/applik8s
            dist/applik8s-artifact-list.txt
